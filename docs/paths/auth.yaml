/api/v1/auth/register:
  post:
    summary: Register a new user
    tags:
      - Auth
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/RegisterDto.yaml'
    responses:
      '201':
        description: User registered successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                user:
                  type: object
                  properties:
                    id:
                      type: string
                      format: uuid
                    email:
                      type: string
                    role:
                      type: string
      '400':
        $ref: '../components/responses/Error.yaml'
      '409':
        description: User already exists
        content:
          application/json:
            schema:
              $ref: '../components/schemas/Error.yaml'

/api/v1/auth/login:
  post:
    summary: Login with email and password
    tags:
      - Auth
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/LoginDto.yaml'
    responses:
      '200':
        description: Login successful
        content:
          application/json:
            schema:
              $ref: '../components/schemas/TokenResponse.yaml'
      '401':
        description: Invalid credentials
        content:
          application/json:
            schema:
              $ref: '../components/schemas/Error.yaml'

/api/v1/auth/refresh:
  post:
    summary: Refresh access token
    tags:
      - Auth
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/RefreshDto.yaml'
    responses:
      '200':
        description: Token refreshed successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                accessToken:
                  type: string
      '401':
        description: Invalid refresh token
        content:
          application/json:
            schema:
              $ref: '../components/schemas/Error.yaml'

/api/v1/auth/google:
  get:
    summary: Initiate Google OAuth flow
    tags:
      - Auth
    responses:
      '302':
        description: Redirects to Google consent screen

/api/v1/auth/google/callback:
  get:
    summary: Google OAuth callback
    tags:
      - Auth
    responses:
      '200':
        description: OAuth authentication successful
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                user:
                  $ref: '../components/schemas/User.yaml'
      '401':
        description: Authentication failed
        content:
          application/json:
            schema:
              $ref: '../components/schemas/Error.yaml'

/api/v1/auth/facebook:
  get:
    summary: Initiate Facebook OAuth flow
    tags:
      - Auth
    responses:
      '302':
        description: Redirects to Facebook consent screen

/api/v1/auth/facebook/callback:
  get:
    summary: Facebook OAuth callback
    tags:
      - Auth
    responses:
      '200':
        description: OAuth authentication successful
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                user:
                  $ref: '../components/schemas/User.yaml'
      '401':
        description: Authentication failed
        content:
          application/json:
            schema:
              $ref: '../components/schemas/Error.yaml'
