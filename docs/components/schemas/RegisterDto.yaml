RegisterDto:
  type: object
  required:
    - email
    - password
    - name
  properties:
    email:
      type: string
      format: email
      description: User's email address
    password:
      type: string
      minLength: 6
      description: User password (min 6 characters)
    name:
      type: string
      minLength: 2
      description: User's full name
    phone:
      type: string
      description: Optional phone number
    profileImage:
      type: string
      format: uri
      description: Optional profile image URL
  example:
    email: john@example.com
    password: secret123
    name: John Doe
    phone: '+1234567890'
