User:
  type: object
  properties:
    id:
      type: string
      format: uuid
      description: User ID
    email:
      type: string
      format: email
    name:
      type: string
    role:
      type: string
      enum: [USER, ADMIN, DELIVERY]
    phone:
      type: string
    profileImage:
      type: string
      format: uri
    emailVerified:
      type: boolean
      default: false
    isActive:
      type: boolean
      default: true
