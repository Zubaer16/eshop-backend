openapi: 3.0.0
info:
  title: E-Shop API
  version: 1.0.0
  description: Backend API for E-Shop project

servers:
  - url: http://localhost:3000
    description: Development server

paths:
  /api/v1/auth/register:
    post:
      summary: Register a new user (PUBLIC)
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterDto'
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: User already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/auth/login:
    post:
      summary: Login with email and password (PUBLIC)
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginDto'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/auth/refresh:
    post:
      summary: Refresh access token (USER, ADMIN, DELIVERY)
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshDto'
      responses:
        '200':
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
        '401':
          description: Invalid refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/auth/google:
    get:
      summary: Initiate Google OAuth flow (PUBLIC)
      tags:
        - Auth
      responses:
        '302':
          description: Redirects to Google consent screen

  /api/v1/auth/google/callback:
    get:
      summary: Google OAuth callback (PUBLIC)
      tags:
        - Auth
      responses:
        '200':
          description: OAuth authentication successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
        '401':
          description: Authentication failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/products:
    get:
      summary: Get all products (USER, ADMIN, DELIVERY)
      tags:
        - Products
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - name: search
          in: query
          schema:
            type: string
        - name: categoryId
          in: query
          schema:
            type: string
            format: uuid
        - name: minPrice
          in: query
          schema:
            type: number
        - name: maxPrice
          in: query
          schema:
            type: number
      responses:
        '200':
          description: Products retrieved successfully
        '401':
          description: Unauthorized

    post:
      summary: Create a new product (ADMIN)
      tags:
        - Products
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductDto'
      responses:
        '201':
          description: Product created successfully
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - Admin only

  /api/v1/products/{id}:
    get:
      summary: Get product by ID (USER, ADMIN, DELIVERY)
      tags:
        - Products
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Product retrieved successfully
        '404':
          description: Product not found

    patch:
      summary: Update a product (ADMIN)
      tags:
        - Products
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductDto'
      responses:
        '200':
          description: Product updated successfully
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - Admin only
        '404':
          description: Product not found

    delete:
      summary: Delete a product (ADMIN)
      tags:
        - Products
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Product deleted successfully
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - Admin only
        '404':
          description: Product not found

  /api/v1/products/slug/{slug}:
    get:
      summary: Get product by slug (USER, ADMIN, DELIVERY)
      tags:
        - Products
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Product retrieved successfully
        '404':
          description: Product not found

components:
  schemas:
    Error:
      type: object
      properties:
        message:
          type: string
        statusCode:
          type: integer

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [USER, ADMIN, DELIVERY]
        phone:
          type: string
        profileImage:
          type: string
          format: uri
        emailVerified:
          type: boolean
        isActive:
          type: boolean

    RegisterDto:
      type: object
      required:
        - email
        - password
        - name
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        name:
          type: string
          minLength: 2
        phone:
          type: string
        profileImage:
          type: string
          format: uri

    LoginDto:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    RefreshDto:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string

    TokenResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        accessToken:
          type: string
        refreshToken:
          type: string

    ProductDto:
      type: object
      required:
        - name
        - slug
        - originalPrice
        - categoryId
      properties:
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        originalPrice:
          type: number
        salePrice:
          type: number
        stock:
          type: integer
        categoryId:
          type: string
          format: uuid
        isOnSale:
          type: boolean
        saleStartDate:
          type: string
          format: date-time
        saleEndDate:
          type: string
          format: date-time
        isActive:
          type: boolean

    Product:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        originalPrice:
          type: number
        salePrice:
          type: number
        stock:
          type: integer
        categoryId:
          type: string
          format: uuid
        isOnSale:
          type: boolean
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

tags:
  - name: Auth
    description: Authentication endpoints
  - name: Products
    description: Product management endpoints